<!DOCTYPE html>
<html lang="en" dir="ltr">
  <head>
    <meta charset="utf-8">
    <title>Styleguide - Techium</title>
  </head>
  <body>

    <main>

      <section>
        <header>
          <h2>Headings</h2>
        </header>
        <div>
          <h1>Heading 1</h1>
          <h2>Heading 2</h2>
          <h3>Heading 3</h3>
          <h4>Heading 4</h4>
          <h5>Heading 5</h5>
          <h6>Heading 6</h6>
        </div>
      </section>

      <section>
        <header>
          <h2>Paragraph</h2>
        </header>
        <div>
          <p>Lorem ipsum dolor sit amet, consectetur adipiscing elit.</p>
        </div>
      </section>

      <section>
        <header>
          <h2>Lists</h2>
        </header>
        <div>
          <ul>
            <li>Item one</li>
            <li>Item two</li>
            <li>Item three</li>
          </ul>

          <ol>
            <li>First</li>
            <li>Second</li>
            <li>Third</li>
          </ol>
        </div>
      </section>

      <!-- Horizontal rule -->
      <section>
        <header>
          <h2>Horizontal rule</h2>
        </header>
        <div>
          <hr>
        </div>
      </section>

    </main>

  </body>
</html>
